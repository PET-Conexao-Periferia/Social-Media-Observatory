services:
  mongodb:
    image: mongo:latest
    container_name: petri_mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=secret
    command: ["mongod", "--auth"]

volumes:
  mongo_data:
